name: Build & Release Installers

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install python-setuptools
          xcode-select --install || true

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install visualstudio2022buildtools --package-parameters="--includeRecommended" -y || echo "VS Build Tools may already be installed"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Build installer (macOS)
        if: runner.os == 'macOS'
        run: npm run electron:make:macos
        continue-on-error: true

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: npm run electron:make:windows
        continue-on-error: true

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: cattle-herd-manager-macos
          path: out/make/*.dmg
          if-no-files-found: ignore

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: cattle-herd-manager-windows
          path: out/make/**/*.exe
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: cattle-herd-manager-macos
          path: ./installers/macos
        continue-on-error: true

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: cattle-herd-manager-windows
          path: ./installers/windows
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./installers/macos/*.dmg
            ./installers/windows/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

